name: Staging Deploy

# 预发布环境自动部署
# 当代码合并到 Pre-merge to main 分支时触发

on:
  push:
    branches: [Pre-merge-to-main]
  # 支持手动触发
  workflow_dispatch:
    inputs:
      version:
        description: '版本号'
        required: false
        type: string

env:
  PNPM_VERSION: '9.0.0'
  NODE_VERSION: '20'

jobs:
  # --------------------------------------------------------------------------
  # 预发布环境部署
  # --------------------------------------------------------------------------
  staging-deploy:
    runs-on: ubuntu-latest
    environment: staging
    timeout-minutes: 30

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: 安装 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: 安装依赖
        run: pnpm install --frozen-lockfile

      - name: 构建 shared 包
        run: pnpm --filter @yunshu/shared build

      - name: Lint 检查
        run: pnpm lint:style || true

      - name: TypeScript 类型检查
        run: pnpm --filter @yunshu/admin type-check || true

      - name: 单元测试
        run: pnpm --filter @yunshu/admin test -- --run || true

      - name: 构建应用
        run: pnpm --filter @yunshu/admin build

      - name: 获取版本信息
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=staging-$(date +%Y%m%d-%H%M%S)" >> $GITHUB_OUTPUT
          fi
          echo "ref=${{ github.ref_name }}" >> $GITHUB_OUTPUT

      - name: 显示构建信息
        run: |
          echo "版本: ${{ steps.version.outputs.version }}"
          echo "分支: ${{ steps.version.outputs.ref }}"
          echo "构建SHA: ${{ github.sha }}"

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: build-artifact-${{ github.run_id }}
          path: |
            apps/admin/dist/**
            packages/shared/dist/**
          retention-days: 7

      # --------------------------------------------------------------------------
      # 部署到预发布环境 (需要根据实际部署方式配置)
      # --------------------------------------------------------------------------
      # - name: 部署到预发布服务器
      #   run: |
      #     # 这里添加实际的部署脚本
      #     echo "部署到预发布环境..."

      - name: 部署通知
        if: always()
        run: |
          echo "=== 预发布部署 ${{ steps.version.outputs.version }} ==="
          echo "状态: ${{ job.status }}"
          echo "触发人: ${{ github.actor }}"
          echo "时间: $(date '+%Y-%m-%d %H:%M:%S')"

  # --------------------------------------------------------------------------
  # 预发布环境验证
  # --------------------------------------------------------------------------
  staging-verify:
    runs-on: ubuntu-latest
    needs: [staging-deploy]
    if: always()
    steps:
      - name: 检查前置任务状态
        run: |
          if [ "${{ needs.staging-deploy.result }}" != "success" ]; then
            echo "预发布部署失败，跳过验证"
            exit 1
          fi
          echo "预发布部署成功，可以进行验证"

      - name: 验证构建产物
        run: |
          echo "下载构建产物进行验证..."
          # 这里可以添加实际的验证脚本

  # --------------------------------------------------------------------------
  # 生成预发布报告
  # --------------------------------------------------------------------------
  staging-report:
    runs-on: ubuntu-latest
    needs: [staging-deploy]
    if: github.event_name != 'workflow_dispatch'
    steps:
      - name: 生成报告
        run: |
          echo "## 预发布部署报告" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 基本信息" >> $GITHUB_STEP_SUMMARY
          echo "- 分支: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- 触发人: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "- 时间: $(date '+%Y-%m-%d %H:%M:%S')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 构建状态" >> $GITHUB_STEP_SUMMARY
          echo "- 状态: ${{ needs.staging-deploy.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 下一步" >> $GITHUB_STEP_SUMMARY
          echo "- [ ] 在预发布环境进行功能测试" >> $GITHUB_STEP_SUMMARY
          echo "- [ ] 执行自动化 E2E 测试" >> $GITHUB_STEP_SUMMARY
          echo "- [ ] 准备发布到生产环境" >> $GITHUB_STEP_SUMMARY
