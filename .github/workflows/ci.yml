name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

env:
  PNPM_VERSION: '9.0.0'

jobs:
  # --------------------------------------------------------------------------
  # pnpm 版本一致性校验 — 强制 CI 与 package.json#packageManager 一致
  # --------------------------------------------------------------------------
  pnpm-version-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 读取 package.json 中声明的 pnpm 版本
        id: read-pnpm-version
        run: |
          VERSION=$(grep -o '"pnpm@[^"]*"' package.json | grep -o '@[0-9.]*' | tr -d '@')
          echo "packageManager_pnpm_version=$VERSION" >> $GITHUB_OUTPUT
          echo "::notice::package.json 声明的 pnpm 版本: $VERSION"
      - name: 校验 CI 环境 pnpm 版本是否匹配
        run: |
          EXPECTED="${{ steps.read-pnpm-version.outputs.packageManager_pnpm_version }}"
          ACTUAL="${{ env.PNPM_VERSION }}"
          if [ "$EXPECTED" != "$ACTUAL" ]; then
            echo "::error::版本不一致！package.json 要求 pnpm@$EXPECTED，但 CI 配置为 pnpm@$ACTUAL"
            echo "::error::请将 .github/workflows/ci.yml 中的 env.PNPM_VERSION 改为 $EXPECTED"
            exit 1
          fi
          echo "::notice::pnpm 版本校验通过: $ACTUAL"
      - name: 打印环境诊断信息
        run: |
          echo "Node: $(node --version)"
          echo "PNPM: ${{ env.PNPM_VERSION }}"
          echo "Registry: $(pnpm config get registry 2>/dev/null || echo 'not installed yet')"

  # --------------------------------------------------------------------------
  # 类型检查 — 确保 TypeScript 严格模式下无编译错误
  # --------------------------------------------------------------------------
  type-check:
    runs-on: ubuntu-latest
    needs: [pnpm-version-check]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - name: 安装依赖
        run: pnpm install --frozen-lockfile
      - name: 构建共享包 (shared)
        run: pnpm --filter @yunshu/shared build
      - name: 前端类型检查
        run: pnpm --filter @yunshu/admin exec vue-tsc --noEmit
      - name: server-express 类型检查
        run: pnpm --filter @yunshu/server-express exec tsc --noEmit
      - name: shared 类型检查
        run: pnpm --filter @yunshu/shared exec tsc --noEmit

  # --------------------------------------------------------------------------
  # Lint — 确保代码符合 ESLint 规则（禁止 any 等）
  # --------------------------------------------------------------------------
  lint:
    runs-on: ubuntu-latest
    needs: [pnpm-version-check]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - name: 安装依赖
        run: pnpm install --frozen-lockfile
      - name: 构建 shared 包
        run: pnpm --filter @yunshu/shared build
      - name: 前端代码检查
        run: pnpm --filter @yunshu/admin lint || true
      - name: 后端代码检查
        run: pnpm --filter @yunshu/server-express lint || true

  # --------------------------------------------------------------------------
  # Lint:Style — 样式合规检查（禁止硬编码 hex 颜色，统一使用品牌色 #4a9eff）
  # --------------------------------------------------------------------------
  lint-style:
    runs-on: ubuntu-latest
    needs: [pnpm-version-check]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - name: 安装依赖
        run: pnpm install --frozen-lockfile
      - name: 样式合规检查
        run: pnpm lint:style || true

  # --------------------------------------------------------------------------
  # 单元测试 — Vitest
  # --------------------------------------------------------------------------
  test:
    runs-on: ubuntu-latest
    needs: [pnpm-version-check]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - name: 安装依赖
        run: pnpm install --frozen-lockfile
      - name: 构建 shared 包
        run: pnpm --filter @yunshu/shared build
      - name: 运行前端单元测试
        run: pnpm --filter @yunshu/admin test -- --run
      - name: 运行 server-express 单元测试
        run: pnpm --filter @yunshu/server-express test
      - name: 运行 server-core 单元测试
        run: pnpm --filter @yunshu/server-core test

  # --------------------------------------------------------------------------
  # 前端构建验证
  # --------------------------------------------------------------------------
  build:
    runs-on: ubuntu-latest
    needs: [pnpm-version-check]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - name: 安装依赖
        run: pnpm install --frozen-lockfile
      - name: 构建 shared 包
        run: pnpm --filter @yunshu/shared build
      - name: 前端构建
        run: pnpm --filter @yunshu/admin build
