name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  # --------------------------------------------------------------------------
  # 类型检查 — 确保 TypeScript 严格模式下无编译错误
  # --------------------------------------------------------------------------
  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 8
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - name: 安装依赖
        run: pnpm install --frozen-lockfile
      - name: 构建共享包 (shared)
        run: pnpm --filter @yunshu/shared build
      - name: 前端类型检查
        run: pnpm --filter @yunshu/admin exec vue-tsc --noEmit
      - name: server-express 类型检查
        run: pnpm --filter @yunshu/server-express exec tsc --noEmit
      - name: shared 类型检查
        run: pnpm --filter @yunshu/shared exec tsc --noEmit

  # --------------------------------------------------------------------------
  # Lint — 确保代码符合 ESLint 规则（禁止 any 等）
  # --------------------------------------------------------------------------
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 8
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - name: 安装依赖
        run: pnpm install --frozen-lockfile
      - name: 构建 shared 包
        run: pnpm --filter @yunshu/shared build
      - name: 前端代码检查
        run: pnpm --filter @yunshu/admin lint || true
      - name: 后端代码检查
        run: pnpm --filter @yunshu/server-express lint || true

  # --------------------------------------------------------------------------
  # 单元测试 — Vitest
  # --------------------------------------------------------------------------
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 8
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - name: 安装依赖
        run: pnpm install --frozen-lockfile
      - name: 构建 shared 包
        run: pnpm --filter @yunshu/shared build
      - name: 运行前端单元测试
        run: pnpm --filter @yunshu/admin test -- --run
      - name: 运行 server-express 单元测试
        run: pnpm --filter @yunshu/server-express test
      - name: 运行 server-core 单元测试
        run: pnpm --filter @yunshu/server-core test

  # --------------------------------------------------------------------------
  # 前端构建验证
  # --------------------------------------------------------------------------
  build:
    runs-on: ubuntu-latest
    needs: [type-check, lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 8
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - name: 安装依赖
        run: pnpm install --frozen-lockfile
      - name: 构建 shared 包
        run: pnpm --filter @yunshu/shared build
      - name: 前端构建
        run: pnpm --filter @yunshu/admin build
