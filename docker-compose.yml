# ========================================
# 云枢中台 — Docker Compose 生产部署配置
# ========================================
# 包含服务：PostgreSQL、Redis、Nginx、后端 Express 应用
# 使用方式：
#   docker compose up -d          # 启动所有服务
#   docker compose logs -f        # 查看实时日志
#   docker compose down           # 停止并删除容器（保留数据卷）
#   docker compose down -v        # 停止并删除容器及数据卷
# ========================================

networks:
  # 自定义网桥网络，隔离服务通信
  yunshu-network:
    driver: bridge
    name: yunshu-network

volumes:
  # PostgreSQL 数据卷（持久化数据库数据）
  postgres-data:
    name: yunshu-postgres-data
  # Redis 数据卷（持久化 AOF/RDB 文件）
  redis-data:
    name: yunshu-redis-data

services:
  # ========================================
  # PostgreSQL 数据库服务
  # ========================================
  postgres:
    image: postgres:16-alpine
    container_name: yunshu-postgres
    restart: unless-stopped
    environment:
      # 数据库初始化用户/密码/库名（首次启动时创建）
      POSTGRES_USER: yunshu
      POSTGRES_PASSWORD: yunshu123
      POSTGRES_DB: yunshu
      # 时区设置
      TZ: Asia/Shanghai
    ports:
      # 暴露端口到宿主机，便于本地工具连接（生产环境可注释掉）
      - "5432:5432"
    volumes:
      # 数据持久化
      - postgres-data:/var/lib/postgresql/data
      # 初始化脚本：首次启动时自动执行 /docker-entrypoint-initdb.d 下的 SQL
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      # 使用 pg_isready 检查数据库是否就绪（以 yunshu 用户连接 yunshu 数据库）
      test: ["CMD-SHELL", "pg_isready -U yunshu -d yunshu"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - yunshu-network

  # ========================================
  # Redis 缓存服务
  # ========================================
  redis:
    image: redis:7-alpine
    container_name: yunshu-redis
    restart: unless-stopped
    command:
      # 使用自定义配置 + 持久化配置（AOF）
      - "redis-server"
      - "/usr/local/etc/redis/redis.conf"
    ports:
      # 暴露端口到宿主机（生产环境可注释掉）
      - "6379:6379"
    volumes:
      # 数据持久化
      - redis-data:/data
      # 挂载自定义配置文件
      - ./docker/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    healthcheck:
      # 使用 redis-cli ping 检查服务是否就绪（需提供密码）
      test: ["CMD", "redis-cli", "-a", "yunshu123", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - yunshu-network

  # ========================================
  # 后端 Express 应用服务
  # ========================================
  backend:
    # 基于项目根目录 Dockerfile 构建镜像
    build:
      context: .
      dockerfile: Dockerfile
    container_name: yunshu-backend
    restart: unless-stopped
    depends_on:
      # 确保 postgres 和 redis 健康检查通过后再启动 backend
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # 运行环境
      NODE_ENV: production
      # 服务监听
      HOST: 0.0.0.0
      PORT: 3000
      # PostgreSQL 连接（服务名 postgres 作为主机名，由 Docker DNS 解析）
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: yunshu
      POSTGRES_PASSWORD: yunshu123
      POSTGRES_DB: yunshu
      # Redis 连接
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: yunshu123
      # JWT 认证配置（从宿主机 .env 文件读取，未设置时使用占位默认值）
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-please}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
    ports:
      - "3000:3000"
    healthcheck:
      # 调用 /api/health 接口检查应用是否正常
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - yunshu-network

  # ========================================
  # Nginx 反向代理（可选）
  # 若不使用可注释掉此服务。推荐用于生产环境统一入口、静态缓存、SSL 终止等
  # ========================================
  nginx:
    image: nginx:alpine
    container_name: yunshu-nginx
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
      # - "443:443"  # 如需 HTTPS，启用此端口并挂载 SSL 证书
    volumes:
      # 挂载自定义 Nginx 配置
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      # 如需 HTTPS，可在此处挂载证书
      # - ./docker/nginx/ssl:/etc/nginx/ssl:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - yunshu-network
