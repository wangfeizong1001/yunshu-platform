# ========================================
# Nginx 反向代理配置 — 云枢中台
# ========================================
# 作为统一入口，将请求转发给后端 Express 服务。
# 挂载位置：/etc/nginx/conf.d/default.conf
# ========================================

# 上游服务器（后端 Express 服务，Docker Compose 服务名作为主机名）
upstream backend_server {
    server backend:3000;
    # 如部署多实例可在此追加，如：
    # server backend2:3000;
}

server {
    # 监听 80 端口
    listen 80;
    listen [::]:80;

    # 服务器名称（生产环境修改为实际域名，如 api.example.com）
    server_name localhost;

    # 字符集
    charset utf-8;

    # ------------------------------------------------------------------------
    # 客户端请求体大小限制（默认仅 1m，上传文件场景需调大）
    # ------------------------------------------------------------------------
    client_max_body_size 10m;

    # 客户端超时时间
    client_body_timeout 30s;
    client_header_timeout 30s;

    # ------------------------------------------------------------------------
    # 日志格式
    # ------------------------------------------------------------------------
    log_format yunshu_main
        '$remote_addr - $remote_user [$time_local] '
        '"$request" $status $body_bytes_sent '
        '"$http_referer" "$http_user_agent" '
        'rt=$request_time uct="$upstream_connect_time" '
        'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/yunshu-access.log yunshu_main;
    error_log  /var/log/nginx/yunshu-error.log warn;

    # ------------------------------------------------------------------------
    # 健康检查（供 Nginx 自身健康检查使用）
    # ------------------------------------------------------------------------
    location = /health {
        access_log off;
        return 200 '{"status":"UP","timestamp":"'$time_iso8601'"}';
        add_header Content-Type application/json;
    }

    # ------------------------------------------------------------------------
    # API 反向代理到后端 Express 服务
    # ------------------------------------------------------------------------
    location /api {
        # 转发协议与地址
        proxy_pass http://backend_server;

        # HTTP 版本与连接优化
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # 传递客户端真实 IP
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Port  $server_port;

        # 超时配置
        proxy_connect_timeout 30s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        # 缓冲区配置
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;

        # 错误页面与重试
        proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
        proxy_next_upstream_tries 2;

        # Gzip 压缩响应（减少带宽）
        gzip on;
        gzip_comp_level 5;
        gzip_min_length 256;
        gzip_proxied any;
        gzip_types
            application/atom+xml
            application/javascript
            application/json
            application/ld+json
            application/manifest+json
            application/rss+xml
            application/vnd.geo+json
            application/vnd.ms-fontobject
            application/x-font-ttf
            application/x-web-app-manifest+json
            application/xhtml+xml
            application/xml
            font/opentype
            image/bmp
            image/svg+xml
            image/x-icon
            text/cache-manifest
            text/css
            text/plain
            text/vcard
            text/vnd.rim.location.xloc
            text/vtt
            text/x-component
            text/x-cross-domain-policy;
        gzip_vary on;
    }

    # ------------------------------------------------------------------------
    # 根路径 / 响应信息（便于调试）
    # ------------------------------------------------------------------------
    location = / {
        default_type application/json;
        return 200 '{"name":"yunshu-gateway","version":"1.0.0","status":"UP","api":"/api","health":"/health"}';
    }

    # ------------------------------------------------------------------------
    # 禁止访问隐藏文件（安全加固）
    # ------------------------------------------------------------------------
    location ~ /\.(?!well-known) {
        deny all;
        access_log off;
        log_not_found off;
    }
}

