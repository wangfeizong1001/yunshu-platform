# ========================================
# Redis 配置文件 — 云枢中台
# ========================================
# 该配置兼顾生产环境安全性与性能需求。
# 通过 docker-compose.yml 挂载到容器内 /usr/local/etc/redis/redis.conf。
# ========================================

# ------------------------------------------------------------------------
# 网络配置
# ------------------------------------------------------------------------

# 监听所有网络接口（容器环境下必须设为 0.0.0.0）
bind 0.0.0.0

# 监听端口（默认 6379）
port 6379

# TCP 连接队列长度（高并发场景可调大）
tcp-backlog 511

# 连接空闲超时（0 表示禁用，由应用端管理连接）
timeout 0

# TCP 心跳检测（每隔 300s 探测客户端是否存活，避免僵尸连接）
tcp-keepalive 300

# ------------------------------------------------------------------------
# 安全配置（生产环境必须）
# ------------------------------------------------------------------------

# 访问密码（与 docker-compose.yml 中 REDIS_PASSWORD 保持一致）
requirepass yunshu123

# 禁用危险命令（避免误操作清空所有数据）
rename-command FLUSHDB ""
rename-command FLUSHALL ""
rename-command KEYS ""

# ------------------------------------------------------------------------
# 持久化配置（AOF + RDB 混合模式）
# ------------------------------------------------------------------------

# 启用 AOF（Append Only File）持久化
appendonly yes

# AOF 文件名
appendfilename "appendonly.aof"

# AOF 同步策略：
#   always  - 每条写命令都同步（最安全，性能最低）
#   everysec- 每秒同步一次（默认，性能与安全的平衡）
#   no      - 由操作系统决定何时同步（性能最高，可能丢数据）
appendfsync everysec

# AOF 重写期间不阻塞主进程的 fsync（应对高写入场景）
no-appendfsync-on-rewrite no

# AOF 文件自动重写触发条件：增长 100% 且超过 64MB
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# RDB 快照（作为 AOF 的补充，便于备份恢复）
# 900 秒内至少 1 次写入 / 300 秒内至少 10 次 / 60 秒内至少 10000 次
save 900 1
save 300 10
save 60 10000

# 后台持久化失败时是否停止写入操作（yes = 确保数据写入必落盘）
stop-writes-on-bgsave-error yes

# RDB 文件是否使用 LZF 压缩
rdbcompression yes

# 是否对 RDB 做 CRC64 校验（约 10% 性能开销，更安全）
rdbchecksum yes

# RDB 文件名
dbfilename dump.rdb

# 数据文件目录（与 docker-compose 的 redis-data 卷挂载路径一致）
dir /data

# ------------------------------------------------------------------------
# 内存管理（防止内存溢出 OOM）
# ------------------------------------------------------------------------

# 最大内存使用上限（容器环境建议设置，避免 Redis 吃光宿主机内存）
maxmemory 256mb

# 内存淘汰策略：
#   volatile-lru      - 对设置了过期时间的键，按 LRU 淘汰
#   allkeys-lru       - 对所有键，按 LRU 淘汰（推荐缓存场景）
#   volatile-lfu      - 对设置了过期时间的键，按 LFU 淘汰
#   allkeys-lfu       - 对所有键，按 LFU 淘汰
#   volatile-ttl      - 优先淘汰最近要过期的键
#   volatile-random   - 随机淘汰设置了过期时间的键
#   allkeys-random    - 随机淘汰所有键
#   noeviction        - 不淘汰，写入操作直接报错（默认）
maxmemory-policy allkeys-lru

# LRU 采样键数量（越大越精准，但消耗 CPU，默认 5）
maxmemory-samples 5

# ------------------------------------------------------------------------
# 日志配置
# ------------------------------------------------------------------------

# 日志级别：debug / verbose / notice / warning
loglevel notice

# 日志文件（空字符串表示输出到标准输出，便于 docker logs 查看）
logfile ""

# ------------------------------------------------------------------------
# 客户端配置
# ------------------------------------------------------------------------

# 最大客户端连接数（默认 10000，根据实际并发调整）
maxclients 1000

# ------------------------------------------------------------------------
# 延迟监控（开发调试时可开启）
# ------------------------------------------------------------------------
# latency-monitor-threshold 100
